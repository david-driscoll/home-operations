services:
  pdm:
    image: ghcr.io/longqt-sea/proxmox-datacenter-manager@sha256:1fb81c418bef562b9780a05e8a781373eb9cc57acda7935a3ee27f5930a6b30a
    container_name: pdm
    hostname: pdm
    cgroup: host
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    cap_add:
      - ALL
    environment:
      PASSWORD: "op://Eris/pdm-root/password"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup
      - /opt/stacks-data/pdm:/etc/proxmox-datacenter-manager
    labels:
      # Enable Traefik
      traefik.enable: true

      # PDM has native OIDC support — no forward-auth middleware needed
      traefik.http.routers.pdm.rule: Host(`pdm.${searchDomain}`)
      traefik.http.routers.pdm.entrypoints: websecure
      traefik.http.routers.pdm.service: pdm
      traefik.http.routers.pdm.tls.certresolver: le

      traefik.http.routers.pdm-tailscale.rule: Host(`pdm.${tailscaleDomain}`)
      traefik.http.routers.pdm-tailscale.entrypoints: tailscale
      traefik.http.routers.pdm-tailscale.service: pdm

      traefik.http.services.pdm.loadbalancer.server.scheme: https
      traefik.http.services.pdm.loadbalancer.server.port: 8443
    restart: unless-stopped
    dns:
      - 100.100.100.100
    networks:
      - dockge_default
    # ports:
    # - "2222:22"
    # - "8443:8443"
x-dockge:
  urls:
    - https://pdm.${searchDomain}
networks:
  dockge_default:
    external: true
