scrape_configs:
  # AdGuard Exporter - DNS metrics (alpha-site only)
  - job_name: 'adguard'
    static_configs:
      - targets: ['adguard-exporter:9617']
        labels:
          host: 'alpha-site'
          service: 'dns'

  - job_name: gatus
    scrape_interval: 10s
    static_configs:
      - targets:
          - gatus:8080
        labels:
          host: 'alpha-site'
          service: 'uptime'