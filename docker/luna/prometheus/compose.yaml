services:
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.55.0@sha256:378f4e03703557d1c6419e6caccf922f96e6d88a530f7431d66a4c4f4b1000fe
    restart: unless-stopped
    dns:
      - 100.100.100.100
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION}
      - --web.enable-lifecycle
    env_file:
      - path: .env
    labels:
      traefik.enable: true
      traefik.http.routers.prometheus.rule: Host(`prometheus.${CLUSTER_DOMAIN}`)
      traefik.http.routers.prometheus.entrypoints: websecure,tailscale
      traefik.http.routers.prometheus.tls.certresolver: le
      traefik.http.routers.prometheus.service: prometheus
      traefik.http.services.prometheus.loadbalancer.server.port: 9090
      traefik.http.routers.prometheus-tailscale.rule: Host(`prometheus-${host}.${tailscaleDomain}`)
      traefik.http.routers.prometheus-tailscale.entrypoints: tailscale
      traefik.http.routers.prometheus-tailscale.service: prometheus
    volumes:
      - ./data:/prometheus:rw
      - ./config/:/etc/prometheus:ro
    networks:
      - dockge_default
    ports:
      - 9090:9090
    depends_on:
      - node-exporter
      - cadvisor
      - blackbox-exporter

  docker-socket-proxy:
    container_name: docker-socket-proxy
    image: tecnativa/docker-socket-proxy:latest@sha256:3400c429c5f9e1b21d62130fb93b16e2e772d4fb7695bd52fc2b743800b9fe9e
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - INFO=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      traefik.enable: false
    networks:
      - dockge_default

  blackbox-exporter:
    container_name: blackbox-exporter
    image: prom/blackbox-exporter:v0.25.0@sha256:b04a9fef4fa086a02fc7fcd8dcdbc4b7b35cc30cdee860fdc6a19dd8b208d63e
    restart: unless-stopped
    command:
      - --config.file=/config/blackbox.yml
    volumes:
      - ./config/blackbox.yml:/config/blackbox.yml:ro
    labels:
      traefik.enable: false
    networks:
      - dockge_default

  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.8.2@sha256:4032c6d5bfd752342c3e631c2f1de93ba6b86c41db6b167b9a35372c139e7706
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.netclass.ignored-devices=^(veth.*|br.*|docker.*|lo)$$"
      - "--collector.nfs"
      - "--collector.nfsd"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    network_mode: host
    pid: host
    labels:
      traefik.enable: false

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.49.1@sha256:3cde6faf0791ebf7b41d6f8ae7145466fed712ea6f252c935294d2608b1af388
    restart: unless-stopped
    dns:
      - 100.100.100.100
    privileged: true
    devices:
      - /dev/kmsg
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    labels:
      traefik.enable: false
    networks:
      - dockge_default
    depends_on:
      - docker-socket-proxy
  thanos-sidecar:
    container_name: thanos-sidecar
    restart: unless-stopped
    image: quay.io/thanos/thanos:v0.37.2@sha256:4ec6df40fdb921de162677b321057caa8fb8324c65f4cfae9568ed55c4469e2c
    dns:
      - 100.100.100.100
    command:
      - sidecar
      - --tsdb.path=/prometheus
      - --prometheus.url=http://prometheus:9090
      - --grpc-address=0.0.0.0:10901
      - --http-address=0.0.0.0:10902
      - --objstore.config-file=/etc/thanos/bucket.yml
    volumes:
      - ../prometheus/data:/prometheus:ro
      - ./config/bucket.yml:/etc/thanos/bucket.yml:ro
    networks:
      - dockge_default
    ports:
      - 10901:10901
      - 10902:10902
    depends_on:
      - prometheus

x-dockge:
  urls:
    - https://prometheus.${CLUSTER_DOMAIN}
    - https://prometheus-${host}.${tailscaleDomain}

networks:
  dockge_default:
    external: true
