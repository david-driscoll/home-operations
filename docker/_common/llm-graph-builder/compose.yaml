services:
  llm-graph-builder-backend:
    container_name: llm-graph-builder-backend
    build:
      context: ./llm-graph-builder-src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    dns:
      - 100.100.100.100
    environment:
      TZ: ${TIMEZONE}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      LLM_MODEL_CONFIG_OLLAMA_LLAMA3: "llama3,http://lmstudio-${host}:1234/v1"
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
      EMBEDDING_MODEL: "all-MiniLM-L6-v2"
      KNN_MIN_SCORE: "0.94"
      IS_EMBEDDING: "true"
      UPDATE_GRAPH_CHUNKS_PROCESSED: "20"
    env_file:
      - path: .env
        required: true
    labels:
      traefik.enable: true

      # Backend API routing (optional, for debugging)
      traefik.http.routers.${APP}-backend.rule: Host(`${APP}-api.${CLUSTER_DOMAIN}`)
      traefik.http.routers.${APP}-backend.entrypoints: websecure
      traefik.http.routers.${APP}-backend.tls.certresolver: le
      traefik.http.routers.${APP}-backend.service: ${APP}-backend

      traefik.http.routers.${APP}-backend-tailscale.rule: Host(`${APP}-api-${host}.${tailscaleDomain}`)
      traefik.http.routers.${APP}-backend-tailscale.entrypoints: tailscale
      traefik.http.routers.${APP}-backend-tailscale.service: ${APP}-backend

      traefik.http.services.${APP}-backend.loadbalancer.server.port: 8000

      # Health check
      traefik.http.services.${APP}-backend.loadbalancer.healthcheck.path: "/health"
      traefik.http.services.${APP}-backend.loadbalancer.healthcheck.port: 8000
      traefik.http.services.${APP}-backend.loadbalancer.healthcheck.interval: 30s
    volumes:
      - ./llm-graph-builder-src/backend:/code
    networks:
      - dockge_default

  llm-graph-builder-frontend:
    container_name: llm-graph-builder-frontend
    build:
      context: ./llm-graph-builder-src/frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_API_URL: "http://llm-graph-builder-backend:8000"
        VITE_REACT_APP_SOURCES: "local,wiki,s3"
        # VITE_LLM_MODELS: "ollama_llama3,openai_gpt_4o"
        VITE_TIME_PER_PAGE: "50"
        VITE_CHUNK_SIZE: "5242880"
        VITE_ENV: "DEV"
        VITE_SKIP_AUTH: "true"
    restart: unless-stopped
    dns:
      - 100.100.100.100
    environment:
      TZ: ${TIMEZONE}
    env_file:
      - path: .env
        required: false
    labels:
      traefik.enable: true

      # Frontend UI routing
      traefik.http.routers.${APP}.rule: Host(`${APP}.${CLUSTER_DOMAIN}`)
      traefik.http.routers.${APP}.entrypoints: websecure
      traefik.http.routers.${APP}.tls.certresolver: le
      traefik.http.routers.${APP}.service: ${APP}

      # Tailscale internal routing (for UI access)
      traefik.http.routers.${APP}-tailscale.rule: Host(`${APP}-${host}.${tailscaleDomain}`)
      traefik.http.routers.${APP}-tailscale.entrypoints: tailscale
      traefik.http.routers.${APP}-tailscale.service: ${APP}

      traefik.http.services.${APP}.loadbalancer.server.port: 8080

      # Health check
      traefik.http.services.${APP}.loadbalancer.healthcheck.path: "/"
      traefik.http.services.${APP}.loadbalancer.healthcheck.port: 8080
      traefik.http.services.${APP}.loadbalancer.healthcheck.interval: 30s
    volumes:
      - ./llm-graph-builder-src/frontend:/app
      - /app/node_modules
    networks:
      - dockge_default

networks:
  dockge_default:
    external: true

x-dockge:
  urls:
    - https://${APP}.${CLUSTER_DOMAIN}
    - https://${APP}-api.${CLUSTER_DOMAIN}
