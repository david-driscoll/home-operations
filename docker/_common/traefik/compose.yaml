services:
  traefik:
    container_name: traefik
    image: ghcr.io/traefik/traefik:v3.7.6@sha256:21a3d83696379bac6434bb32e1dde0aff0e84ef2abd053ed3db87d3f45e749b2
    restart: unless-stopped
    dns:
      - 100.100.100.100
    command:
      - --configfile=/config/config.yaml
    labels:
      autoheal: true
      # Enable Traefik for itself
      traefik.enable: true
      # Dashboard configuration
      traefik.http.routers.dashboard.rule: Host(`internal.${CLUSTER_DOMAIN}`)
      traefik.http.routers.dashboard.middlewares: authentik-outpost@docker
      traefik.http.routers.dashboard.entrypoints: websecure
      traefik.http.routers.dashboard.service: api@internal
      traefik.http.routers.dashboard.tls.certresolver: le

      traefik.http.routers.dashboard-tailscale.rule: Host(`internal-${host}.${tailscaleDomain}`)
      traefik.http.routers.dashboard-tailscale.entrypoints: tailscale
      traefik.http.routers.dashboard-tailscale.service: api@internal

      # The middleware
      traefik.http.middlewares.authentik-outpost.forwardauth.address: http://authentik_proxy:9000/outpost.goauthentik.io/auth/traefik
      traefik.http.middlewares.authentik-outpost.forwardauth.trustForwardHeader: true
      traefik.http.middlewares.authentik-outpost.forwardauth.authResponseHeaders: X-authentik-username,X-authentik-groups,X-authentik-entitlements,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version

    env_file:
      - path: .env
    ports:
      - 80:80
      - 443:443
      - 5443:5443
      - 8443:8443
      - 2022:2022/tcp
      - 7687:7687
      - 8082:8082/tcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
      - ./config.yaml:/config/config.yaml
      - /opt/stacks-data/${APP}/dynamic:/config/dynamic
      - ./dynamic/middlewares.yaml:/config/dynamic/middlewares.yaml
    networks:
      - dockge_default
  cert-extractor:
    image: ghcr.io/datacore/traefik-certextractor:1.0.0@sha256:415495c0633c08cec5ad74bd5fd1e7b1078a0748c930f33ce6c065770e703ec1
    restart: unless-stopped
    environment:
      AcmeFileServiceOptions__FilePath: "/var/cert/in/acme.json"
      CertExtractorServiceOptions__DirectoryPath: "/var/cert/out/"
    volumes:
      - ./letsencrypt:/var/cert/in/:ro
      - ./certs/:/var/cert/out/
  error-pages:
    container_name: error-pages
    image: ghcr.io/tarampampam/error-pages:4.2@sha256:978c1f83e8f26742743ec3b565214ed9f2296cb5171b592071a6569dceac8c26
    environment:
      # TEMPLATE_NAME: "ghost"
      # disabled/random-on-startup/random-on-each-request/random-hourly/random-daily
      TEMPLATES_ROTATION_MODE: random-hourly
      SEND_SAME_HTTP_CODE: true
      SHOW_DETAILS: true
    networks:
      - dockge_default
x-dockge:
  urls:
    - https://internal.${CLUSTER_DOMAIN}
    - https://internal-${host}.${tailscaleDomain}
networks:
  dockge_default:
    external: true
