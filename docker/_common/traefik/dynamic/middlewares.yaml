http:
  middlewares:
    compress:
      compress:
        minResponseBodyBytes: 1024
    errors:
      errors:
        status:
          - "401-599"
        query: /{status}.html
        service: error-pages@file
  services:
    error-pages:
      loadBalancer:
        servers:
          - url: "http://error-pages:8080"
