services:
  alloy:
    user: "65534:65534"
    container_name: alloy
    image: grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    restart: unless-stopped
    dns:
      - 100.100.100.100
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy
      - /etc/alloy/config.alloy
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    labels:
      autoheal: true
      traefik.enable: true
      traefik.http.routers.alloy.rule: Host(`alloy.${CLUSTER_DOMAIN}`)
      traefik.http.routers.alloy.entrypoints: websecure
      traefik.http.routers.alloy.tls.certresolver: le
      traefik.http.services.alloy.loadbalancer.server.port: 12345
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./data/alloy:/var/lib/alloy:rw
    networks:
      - dockge_default

  prometheus:
    user: "65534:65534"
    container_name: prometheus
    image: prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    restart: unless-stopped
    dns:
      - 100.100.100.100
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=4h
      - --web.enable-lifecycle
    labels:
      autoheal: true
      traefik.enable: true
      traefik.http.routers.prometheus.rule: Host(`prometheus.${CLUSTER_DOMAIN}`)
      traefik.http.routers.prometheus.entrypoints: websecure,tailscale
      traefik.http.routers.prometheus.tls.certresolver: le
      traefik.http.routers.prometheus.service: prometheus
      traefik.http.services.prometheus.loadbalancer.server.port: 9090
    extra_hosts:
      - "node-exporter:host-gateway"
    volumes:
      - ./data/prometheus:/prometheus:rw
      - ./config/:/etc/prometheus:ro
    networks:
      - dockge_default
    ports:
      - 9090:9090
    depends_on:
      - node-exporter
      - cadvisor
      - blackbox-exporter
      # - pve-exporter

  # pve-exporter:
  #   container_name: pve-exporter
  #   image: prompve/prometheus-pve-exporter:3.9.0@sha256:e1e61099c4c4b385bbf88eff61886a5ff4d84be5e88ed7af6c77f98e783de978
  #   restart: unless-stopped
  #   dns:
  #     - 100.100.100.100
  #   command:
  #     - --config.file=/etc/pve/pve.yml
  #   environment:
  #     - PVE_USER=${PVE_USER}
  #     - PVE_TOKEN_NAME=${PVE_TOKEN_NAME}
  #     - PVE_TOKEN_VALUE=${PVE_TOKEN_VALUE}
  #   volumes:
  #     - ./config/pve.yml:/etc/pve/pve.yml:ro
  #   labels:
  #     autoheal: true
  #     traefik.enable: false
  #   networks:
  #     - dockge_default

  prometheus-config-reloader:
    container_name: prometheus-config-reloader
    image: ghcr.io/prometheus-operator/prometheus-config-reloader:v0.92.1@sha256:74550ba3e8bf93f47bc574231090d340ae9c01d25cd11ff74799e65f9fdb9a48
    restart: unless-stopped
    command:
      - --watched-dir=/etc/prometheus
      - --reload-url=http://prometheus:9090/-/reload
      - --log-level=info
    volumes:
      - ./config/:/etc/prometheus:ro
    labels:
      autoheal: true
      traefik.enable: false
    networks:
      - dockge_default
    depends_on:
      - prometheus

  alloy-config-reloader:
    container_name: alloy-config-reloader
    image: ghcr.io/prometheus-operator/prometheus-config-reloader:v0.92.1@sha256:74550ba3e8bf93f47bc574231090d340ae9c01d25cd11ff74799e65f9fdb9a48
    restart: unless-stopped
    command:
      - --watched-dir=/etc/alloy
      - --reload-url=http://alloy:12345/-/reload
      - --log-level=info
    volumes:
      - ./config/alloy:/etc/alloy:ro
    labels:
      autoheal: true
      traefik.enable: false
    networks:
      - dockge_default
    depends_on:
      - alloy

  blackbox-exporter:
    user: "65534:65534"
    container_name: blackbox-exporter
    image: prom/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc
    restart: unless-stopped
    command:
      - --config.file=/config/blackbox.yml
    volumes:
      - ./config/blackbox.yml:/config/blackbox.yml:ro
    labels:
      autoheal: true
      traefik.enable: false
    networks:
      - dockge_default

  node-exporter:
    user: "65534:65534"
    container_name: node-exporter
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)(\
        $$|/)"
      - "--collector.netclass.ignored-devices=^(veth.*|br.*|docker.*|lo)$$"
      - "--collector.nfs"
      - "--collector.nfsd"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    network_mode: host
    pid: host
    labels:
      autoheal: true
      traefik.enable: false

  cadvisor:
    user: "65534:65534"
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.55.1@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    restart: unless-stopped
    dns:
      - 100.100.100.100
    privileged: true
    devices:
      - /dev/kmsg
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /etc/machine-id:/etc/machine-id:ro
    labels:
      traefik.enable: false
      autoheal: true
    networks:
      - dockge_default

x-dockge:
  urls:
    - https://prometheus.${CLUSTER_DOMAIN}
    - https://prometheus-${host}.${tailscaleDomain}
    - https://alloy.${CLUSTER_DOMAIN}
    - https://alloy-${host}.${tailscaleDomain}

networks:
  dockge_default:
    external: true
