services:
  neo4j:
    container_name: neo4j
    image: neo4j:5.26-community@sha256:d3369f919ae589bb98b152cb306e219ac6694781f2e6e6604f46237b964457d4
    restart: unless-stopped
    dns:
      - 100.100.100.100
    environment:
      TZ: ${TIMEZONE}
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc", "apoc-extended", "genai"]'
      NEO4J_server_memory_pagecache_size: 2G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
    labels:
      traefik.enable: true

      # HTTPS routing via Traefik
      traefik.http.routers.${APP}.rule: Host(`${APP}.${CLUSTER_DOMAIN}`)
      traefik.http.routers.${APP}.entrypoints: websecure
      traefik.http.routers.${APP}.tls.certresolver: le
      traefik.http.routers.${APP}.service: ${APP}

      traefik.tcp.routers.${APP}-bolt.rule: HostSNI(`${APP}.${CLUSTER_DOMAIN}`)
      traefik.tcp.routers.${APP}-bolt.entrypoints: bolt
      traefik.tcp.routers.${APP}-bolt.tls.certresolver: le
      traefik.tcp.routers.${APP}-bolt.service: ${APP}-bolt

      # Tailscale internal routing
      traefik.http.routers.${APP}-tailscale.rule: Host(`${APP}-${host}.${tailscaleDomain}`)
      traefik.http.routers.${APP}-tailscale.entrypoints: tailscale
      traefik.http.routers.${APP}-tailscale.service: ${APP}

      traefik.tcp.routers.${APP}-bolt-tailscale.rule: HostSNI(`${APP}-${host}.${tailscaleDomain}`)
      traefik.tcp.routers.${APP}-bolt-tailscale.entrypoints: bolt
      traefik.tcp.routers.${APP}-bolt-tailscale.tls.certresolver: le
      traefik.tcp.routers.${APP}-bolt-tailscale.service: ${APP}-bolt

      # Service port for HTTP (Neo4j Browser)
      traefik.http.services.${APP}.loadbalancer.server.port: 7474
      traefik.tcp.services.${APP}-bolt.loadbalancer.server.port: 7687

      # Health check
      traefik.http.services.${APP}.loadbalancer.healthcheck.path: "/"
      traefik.http.services.${APP}.loadbalancer.healthcheck.port: 7474
      traefik.http.services.${APP}.loadbalancer.healthcheck.interval: 30s
    volumes:
      - ./neo4j-data:/data
      - ./neo4j-logs:/logs
    networks:
      - dockge_default

  neo4j-cypher:
    container_name: neo4j-cypher
    image: mcp/neo4j-cypher:latest@sha256:b252997d16d37633a5a1b30e21ac0bf368b1c64e5895e4005313c84d77a05310
    restart: unless-stopped
    depends_on:
      - neo4j
    environment:
      TZ: ${TIMEZONE}
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_TRANSPORT: "http"
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8000"
      NEO4J_MCP_SERVER_PATH: "/mcp/cypher"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1"
    labels:
      traefik.enable: true
      traefik.http.routers.${APP}-mcp-cypher.rule: Host(`${APP}.${CLUSTER_DOMAIN}`) && PathPrefix(`/mcp/cypher`)
      traefik.http.routers.${APP}-mcp-cypher.entrypoints: websecure
      traefik.http.routers.${APP}-mcp-cypher.tls.certresolver: le
      traefik.http.routers.${APP}-mcp-cypher.middlewares: ${APP}-mcp-cypher-strip
      # traefik.http.middlewares.${APP}-mcp-cypher-strip.stripprefix.prefixes: /mcp/cypher
      traefik.http.services.${APP}-mcp-cypher.loadbalancer.server.port: 8000
    networks:
      - dockge_default

  neo4j-data-modeling:
    container_name: neo4j-data-modeling
    image: mcp/neo4j-data-modeling:latest@sha256:3c72de00df50d42a0950615755f596d75ebcf970afb82b9046d7c931ca920265
    restart: unless-stopped
    depends_on:
      - neo4j
    environment:
      TZ: ${TIMEZONE}
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_TRANSPORT: "http"
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8001"
      NEO4J_MCP_SERVER_PATH: "/mcp/data-modeling"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1"
    labels:
      traefik.enable: true
      traefik.http.routers.${APP}-mcp-data-modeling.rule: Host(`${APP}.${CLUSTER_DOMAIN}`) && PathPrefix(`/mcp/data-modeling`)
      traefik.http.routers.${APP}-mcp-data-modeling.entrypoints: websecure
      traefik.http.routers.${APP}-mcp-data-modeling.tls.certresolver: le
      traefik.http.routers.${APP}-mcp-data-modeling.middlewares: ${APP}-mcp-data-modeling-strip
      # traefik.http.middlewares.${APP}-mcp-data-modeling-strip.stripprefix.prefixes: /mcp/data-modeling
      traefik.http.services.${APP}-mcp-data-modeling.loadbalancer.server.port: 8001
    networks:
      - dockge_default

  neo4j-memory:
    container_name: neo4j-memory
    image: mcp/neo4j-memory:latest@sha256:0f04105a1006ea5305521c0ae2b74509b23df5f90459fdd77f9214c5ccd7d2d6
    restart: unless-stopped
    depends_on:
      - neo4j
    environment:
      TZ: ${TIMEZONE}
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_TRANSPORT: "http"
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8002"
      NEO4J_MCP_SERVER_PATH: "/mcp/memory"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1"
    labels:
      traefik.enable: true
      traefik.http.routers.${APP}-mcp-memory.rule: Host(`${APP}.${CLUSTER_DOMAIN}`) && PathPrefix(`/mcp/memory`)
      traefik.http.routers.${APP}-mcp-memory.entrypoints: websecure
      traefik.http.routers.${APP}-mcp-memory.tls.certresolver: le
      traefik.http.routers.${APP}-mcp-memory.middlewares: ${APP}-mcp-memory-strip
      # traefik.http.middlewares.${APP}-mcp-memory-strip.stripprefix.prefixes: /mcp/memory
      traefik.http.services.${APP}-mcp-memory.loadbalancer.server.port: 8002
    networks:
      - dockge_default

networks:
  dockge_default:
    external: true

x-dockge:
  urls:
    - https://${APP}.${CLUSTER_DOMAIN}/browser
