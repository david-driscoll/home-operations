services:
  backups:
    user: "65534:65534"
    image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:478b9038d187e5b5c29bfa8173ded5d29e864b5ad06102a12106380ee01e2e49
    volumes:
      - ./:/workspace
      - ./keys:/keys:ro
      - ./jobs:/jobs:ro
      - /data/backup:/data/backup:rw
      # - /data/restic:/data/restic:rw
      - /spike/backup:/spike/backup:ro
      - /spike/data:/spike/data:ro
    working_dir: /workspace
    restart: unless-stopped
    dns:
      - 100.100.100.100
    command: dotnet run Playground.cs
    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_NOLOGO=1
      - DOTNET_CLI_HOME=/workspace/.dotnet
    env_file:
      - .env
    cpus: 1
