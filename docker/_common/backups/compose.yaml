services:
  backups:
    user: "65534:65534"
    image: mcr.microsoft.com/dotnet/sdk:10.0@sha256:c0790639332692a0d56cdd81ed581cfd24d040d9839764c138994866df89a3b6
    volumes:
      - ./:/workspace
      - /opt/stacks-data/${APP}/keys:/keys:ro
      - /opt/stacks-data/${APP}/jobs:/jobs:ro
      - /data/backup:/data/backup:rw
      # - /data/restic:/data/restic:rw
      - /spike/backup:/spike/backup:ro
      - /spike/data:/spike/data:ro
    tmpfs:
      - /tmp:uid=65534,gid=65534,exec
    working_dir: /workspace
    restart: unless-stopped
    dns:
      - 100.100.100.100
    command: dotnet run Playground.cs
    environment:
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_NOLOGO=1
      - DOTNET_CLI_HOME=/tmp/.dotnet
      - NUGET_PACKAGES=/tmp/.nuget/packages
      - XDG_DATA_HOME=/tmp
      - RCLONE_CONFIG=/tmp/rclone.conf
      - TMPDIR=/tmp
    env_file:
      - .env
    cpus: 1
