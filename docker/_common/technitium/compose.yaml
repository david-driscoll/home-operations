services:
  tailscale:
    image: tailscale/tailscale:latest@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
    container_name: technitium-ts
    # hostname lives on the net ns owner; technitium shares this namespace and
    # therefore cannot set its own hostname (network_mode: service:tailscale)
    hostname: ${CLUSTER_KEY}
    restart: unless-stopped
    dns:
      - 100.100.100.100
    env_file:
      - .env
    environment:
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_ACCEPT_DNS: "true"
      # TS_AUTHKEY and TS_HOSTNAME must be set in .env
      # TS_HOSTNAME should be unique per cluster, e.g. technitium-celestia
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /opt/stacks-data/${APP}/tailscale:/var/lib/tailscale
    networks:
      - dockge_default
    # Ports live here because technitium shares this network namespace
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "853:853/tcp"
      - "853:853/udp"
      - "8053:8053/tcp"
      - "8053:8053/udp"
      - "5380:5380/tcp"
      - "53443:53443/tcp"
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535
    # Traefik labels live here for the same reason — technitium has no network identity of its own
    labels:
      traefik.enable: true
      traefik.docker.network: dockge_default

      # Admin web UI via local domain
      traefik.http.routers.technitium.rule: Host(`${CLUSTER_KEY}.technitium.${ROOT_DOMAIN}`)
      traefik.http.routers.technitium.entrypoints: websecure
      traefik.http.routers.technitium.tls.certresolver: le
      traefik.http.routers.technitium.service: technitium-admin

      # Admin UI via Tailscale
      traefik.http.routers.technitium-tailscale.rule: Host(`technitium-${host}.${tailscaleDomain}`)
      traefik.http.routers.technitium-tailscale.entrypoints: tailscale
      traefik.http.routers.technitium-tailscale.service: technitium-admin

      traefik.http.services.technitium-admin.loadbalancer.server.port: 5380

      # DNS over HTTPS (DoH)
      traefik.http.routers.technitium-doh.rule: Host(`${CLUSTER_KEY}.technitium.${ROOT_DOMAIN}`) && Path(`/dns-query`)
      traefik.http.routers.technitium-doh.entrypoints: websecure
      traefik.http.routers.technitium-doh.tls.certresolver: le
      traefik.http.routers.technitium-doh.service: technitium-doh
      traefik.http.services.technitium-doh.loadbalancer.server.port: 5380
    healthcheck:
      test: ["CMD-SHELL", "tailscale status --json | grep -q '\"BackendState\":\"Running\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  technitium:
    restart: unless-stopped
    image: technitium/dns-server:15.3.0@sha256:c5ea91d9018688ef7e671fbbba2b7c0ff6434b0cc18b4edfa6a68142b39984eb
    container_name: technitium
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    env_file:
      - .env
    # DNS_SERVER_DOMAIN must be set in .env to the MagicDNS hostname (e.g. technitium-celestia.tail-abc123.ts.net)
    # so the self-signed cert CN matches what cluster nodes use to reach each other over Tailscale
    volumes:
      - /opt/stacks-data/${APP}/config:/etc/dns
      - /opt/stacks/traefik/certs:/etc/ssl/certs

networks:
  dockge_default:
    external: true

x-dockge:
  urls:
    - https://${CLUSTER_KEY}.technitium.${ROOT_DOMAIN}
    - https://technitium-${host}.${tailscaleDomain}
    - http://${ipAddress}:5380
