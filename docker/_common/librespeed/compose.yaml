services:
  traefik:
    container_name: speedtest
    image: ghcr.io/librespeed/speedtest:latest@sha256:c099eac0c5405eee5bd1c418ff2270281e52032923d7de7c162f9b39d09f9405
    restart: unless-stopped
    dns:
      - 100.100.100.100
    labels:
      # Enable Traefik for itself
      traefik.enable: true
      # Dashboard configuration
      traefik.http.routers.librespeed.rule: Host(`librespeed.${CLUSTER_DOMAIN}`)
      traefik.http.routers.librespeed.entrypoints: websecure
      traefik.http.routers.librespeed.service: librespeed
      traefik.http.routers.librespeed.tls.certresolver: le

      traefik.http.services.librespeed.loadbalancer.server.port: 8080
    environment:
      - USE_NEW_DESIGN=true
      - TELEMETRY=false
      - ENABLE_ID_OBFUSCATION=false
      - REDACT_IP_ADDRESSES=false
    networks:
      - dockge_default
x-dockge:
  urls:
    - https://librespeed.${CLUSTER_DOMAIN}
networks:
  dockge_default:
    external: true
