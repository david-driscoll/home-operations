services:
  arcane-agent:
    image: ghcr.io/getarcaneapp/agent:latest@sha256:deb74013ac72cbdecd46abc0b34248f6f3425b5ebd04d36e260f04518808e605
    container_name: arcane-agent
    environment:
      - EDGE_AGENT=true
      - EDGE_TRANSPORT=auto
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    env_file:
      - .env
      - path: /opt/stacks-data/${APP}/agent-token.env
        required: false
    volumes:
      - agent-data:/app/data
    cgroup: host
    restart: unless-stopped
    networks:
      - dockge_default
    healthcheck:
      test: [ 'CMD', '/app/arcane', 'health' ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  agent-data: {}

networks:
  dockge_default:
    external: true
