services:
  rclone-sftp:
    user: "65534:65534"
    container_name: rclone-sftp
    image: rclone/rclone:1.73.4@sha256:654f6517c7aaec7e377690b2caf7c272dbe5f3b8200afbc14a00df6b4a9aa6ef
    restart: unless-stopped
    dns:
      - 100.100.100.100
    env_file:
      - path: .env
    command: >-
      serve sftp ${DATA_ROOT} --addr :${SFTP_PORT} --authorized-keys
      /config/ssh/authorized_keys
    volumes:
      - ${DATA_ROOT}:${DATA_ROOT}:rw
      - ./keys:/config/ssh:ro
    tmpfs:
      - /.cache:uid=65534,gid=65534
    networks:
      - dockge_default
    labels:
      traefik.enable: true
      traefik.tcp.routers.rclone-sftp.rule: HostSNI(`*`)
      traefik.tcp.routers.rclone-sftp.entrypoints: sftp
      traefik.tcp.services.rclone-sftp.loadbalancer.server.port: 2022

networks:
  dockge_default:
    external: true
