---
# kustomization.yaml
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./externalsecret.yaml
  - ./definition.yaml
configMapGenerator:
- name: dynacat-config
  files:
  - ./resources/dynacat.yml
  - ./resources/home.yaml
  - ./resources/homelab.yaml
  - ./resources/high-seas.yaml
  - ./resources/staging.yaml
  options:
    disableNameSuffixHash: true
    annotations:
      kustomize.toolkit.fluxcd.io/substitute: disabled

- name: dynacat-widgets
  files:
    - ./resources/widgets/nhl-today.yaml
    - ./resources/widgets/nodes.yaml
    - ./resources/widgets/service-status.yaml
    - ./resources/widgets/media-playing.yaml
  options:
    disableNameSuffixHash: true
    annotations:
      kustomize.toolkit.fluxcd.io/substitute: disabled

- name: dynacat-extensions
  files:
    - ./resources/Extensions.cs
  options:
    disableNameSuffixHash: true
    annotations:
      kustomize.toolkit.fluxcd.io/substitute: disabled

- name: dynacat-servers
  files:
    - ./resources/servers/alpha-site.yaml
    - ./resources/servers/celestia.yaml
    - ./resources/servers/equestria.yaml
    - ./resources/servers/luna.yaml
    - ./resources/servers/skystar.yaml
    - ./resources/servers/sgc.yaml
  options:
    disableNameSuffixHash: true
    annotations:
      kustomize.toolkit.fluxcd.io/substitute: disabled
