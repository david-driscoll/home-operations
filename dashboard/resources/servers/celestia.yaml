# yaml-language-server: $schema=https://raw.githubusercontent.com/not-first/glance-schema/master/schema.json#/properties/pages
- name: Celestia
  width: wide
  desktop-navigation-width: default

  columns:

    - size: small
      widgets:
        - type: custom-api
          title: Cluster Applications
          url: ${AUTHENTIK_URL}/api/v3/core/applications/?group=System:+Celestia&page_size=100&superuser_full_list=true
          cache: 1h
          headers:
            Authorization: Bearer ${AUTHENTIK_API_TOKEN}
            Accept: application/json
          subrequests:
            apps:
              url: ${AUTHENTIK_URL}/api/v3/core/applications/?group=Celestia&page_size=100&superuser_full_list=true
              headers:
                Authorization: Bearer ${AUTHENTIK_API_TOKEN}
                Accept: application/json
          template: |
            <style>
              .app-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,0.05);border-radius:8px;text-decoration:none;color:var(--color-primary);transition:background 120ms ease-in-out;}
              .app-item:hover{background:rgba(0,0,0,0.08);}
              .app-icon{width:24px;height:24px;object-fit:contain;}
              .app-name{font-size:0.95rem;font-weight:600;}
              .app-description{display:block;font-size:0.8rem;color:var(--color-subdue);}
              .app-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin:0;padding:0;list-style:none;}
              .app-grid-item{margin:0;}
            </style>
            <ul class="app-grid">
            {{ range $.JSON.Array "results" | sortByString "name" "asc" }}
              {{ $url := .String "meta_launch_url" }}
              {{ if ne $url "" }}
                <li class="app-grid-item"><a href="{{ $url }}" target="_blank" class="app-item" title="{{ .String "meta_description"}}"><span><span class="app-name">{{ .String "name" }}</span>{{ if .String "meta_icon" }}<img src="{{ .String "meta_icon"}}" class="app-icon">{{ end }}</span></a></li>
              {{ end }}
            {{ end }}
            </ul>

        - type: custom-api
          title: Active Alerts
          url: ${THANOS_URL}/api/v1/query
          cache: 1m
          parameters:
            query: 'ALERTS{alertstate="firing",severity!="info",alertname!="Watchdog",cluster="celestia"}'
          template: |
            {{ $alerts := $.JSON.Array "data.result" }}
            {{ if eq (len $alerts) 0 }}
              <p style="color:var(--color-positive);padding:2px 0;font-size:0.9rem;">✓ No firing alerts</p>
            {{ else }}
              <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:5px;">
              {{ range $alerts }}
                {{ $sev := .String "metric.severity" }}
                <li style="padding:6px 10px;border-radius:6px;background:rgba(0,0,0,0.05);border-left:3px solid {{ if eq $sev "critical" }}var(--color-negative){{ else }}var(--color-primary){{ end }};">
                  <span style="font-weight:600;font-size:0.9rem;">{{ .String "metric.alertname" }}</span>
                  {{ if .String "metric.namespace" }}<span style="font-size:0.8rem;color:var(--color-subdue);"> · {{ .String "metric.namespace" }}</span>{{ end }}
                  <span style="font-size:0.75rem;color:var(--color-subdue);display:block;text-transform:capitalize;">{{ $sev }}</span>
                </li>
              {{ end }}
              </ul>
            {{ end }}

        - type: custom-api
          title: Cluster Resources
          url: ${THANOS_URL}/api/v1/query
          cache: 2m
          parameters:
            query: 'round(100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle",cluster="celestia"}[5m]))), 0.1)'
          subrequests:
            memory:
              url: ${THANOS_URL}/api/v1/query
              parameters:
                query: 'round(100 * (1 - avg(node_memory_MemAvailable_bytes{cluster="celestia"} / node_memory_MemTotal_bytes{cluster="celestia"})), 0.1)'
          template: |
            {{ $cpu := $.JSON.String "data.result.0.value.1" }}
            {{ $mem := (.Subrequest "memory").JSON.String "data.result.0.value.1" }}
            <div style="display:flex;gap:24px;padding:4px 0;">
              <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">CPU</div><div style="font-size:1.2rem;font-weight:700;">{{ if $cpu }}{{ $cpu }}%{{ else }}N/A{{ end }}</div></div>
              <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">Memory</div><div style="font-size:1.2rem;font-weight:700;">{{ if $mem }}{{ $mem }}%{{ else }}N/A{{ end }}</div></div>
            </div>

    - size: full
      widgets: []
