# yaml-language-server: $schema=https://raw.githubusercontent.com/not-first/glance-schema/master/schema.json#/properties/pages
- name: Homelab
  head-widgets:
    - type: extension
      url: ${GLANCE_K8S_SGC_URL}/extension/nodes
      allow-potentially-dangerous-html: true
      cache: 30s
      title: Stargate Nodes
      title-url: ${HEADLAMP_SGC_URL}
      parameters:
        show-if: glance.hide != "true"
    - type: extension
      url: ${GLANCE_K8S_EQUESTRIA_URL}/extension/nodes
      allow-potentially-dangerous-html: true
      cache: 30s
      title: Equestria Nodes
      title-url: ${HEADLAMP_EQUESTRIA_URL}
      parameters:
        show-if: glance.hide != "true"
    - type: group
      widgets:
      - type: custom-api
        title: Alpha Site
        url: ${THANOS_URL}/api/v1/query
        cache: 2m
        parameters:
          query: 'round(100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle",cluster="alpha-site"}[5m]))), 0.1)'
        subrequests:
          memory:
            url: ${THANOS_URL}/api/v1/query
            parameters:
              query: 'round(100 * (1 - avg(node_memory_MemAvailable_bytes{cluster="alpha-site"} / node_memory_MemTotal_bytes{cluster="alpha-site"})), 0.1)'
        template: |
          {{ $cpu := $.JSON.String "data.result.0.value.1" }}
          {{ $mem := (.Subrequest "memory").JSON.String "data.result.0.value.1" }}
          <div style="display:flex;gap:24px;padding:4px 0;">
            <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">CPU</div><div style="font-size:1.2rem;font-weight:700;">{{ if $cpu }}{{ $cpu }}%{{ else }}N/A{{ end }}</div></div>
            <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">Memory</div><div style="font-size:1.2rem;font-weight:700;">{{ if $mem }}{{ $mem }}%{{ else }}N/A{{ end }}</div></div>
          </div>
      - type: custom-api
        title: Celestia
        url: ${THANOS_URL}/api/v1/query
        cache: 2m
        parameters:
          query: 'round(100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle",cluster="celestia"}[5m]))), 0.1)'
        subrequests:
          memory:
            url: ${THANOS_URL}/api/v1/query
            parameters:
              query: 'round(100 * (1 - avg(node_memory_MemAvailable_bytes{cluster="celestia"} / node_memory_MemTotal_bytes{cluster="celestia"})), 0.1)'
        template: |
          {{ $cpu := $.JSON.String "data.result.0.value.1" }}
          {{ $mem := (.Subrequest "memory").JSON.String "data.result.0.value.1" }}
          <div style="display:flex;gap:24px;padding:4px 0;">
            <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">CPU</div><div style="font-size:1.2rem;font-weight:700;">{{ if $cpu }}{{ $cpu }}%{{ else }}N/A{{ end }}</div></div>
            <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">Memory</div><div style="font-size:1.2rem;font-weight:700;">{{ if $mem }}{{ $mem }}%{{ else }}N/A{{ end }}</div></div>
          </div>
      - type: custom-api
        title: Luna
        url: ${THANOS_URL}/api/v1/query
        cache: 2m
        parameters:
          query: 'round(100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle",cluster="luna"}[5m]))), 0.1)'
        subrequests:
          memory:
            url: ${THANOS_URL}/api/v1/query
            parameters:
              query: 'round(100 * (1 - avg(node_memory_MemAvailable_bytes{cluster="luna"} / node_memory_MemTotal_bytes{cluster="luna"})), 0.1)'
        template: |
          {{ $cpu := $.JSON.String "data.result.0.value.1" }}
          {{ $mem := (.Subrequest "memory").JSON.String "data.result.0.value.1" }}
          <div style="display:flex;gap:24px;padding:4px 0;">
            <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">CPU</div><div style="font-size:1.2rem;font-weight:700;">{{ if $cpu }}{{ $cpu }}%{{ else }}N/A{{ end }}</div></div>
            <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">Memory</div><div style="font-size:1.2rem;font-weight:700;">{{ if $mem }}{{ $mem }}%{{ else }}N/A{{ end }}</div></div>
          </div>
      - type: custom-api
        title: Skystar
        url: ${THANOS_URL}/api/v1/query
        cache: 2m
        parameters:
          query: 'round(100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle",cluster="skystar"}[5m]))), 0.1)'
        subrequests:
          memory:
            url: ${THANOS_URL}/api/v1/query
            parameters:
              query: 'round(100 * (1 - avg(node_memory_MemAvailable_bytes{cluster="skystar"} / node_memory_MemTotal_bytes{cluster="skystar"})), 0.1)'
        template: |
          {{ $cpu := $.JSON.String "data.result.0.value.1" }}
          {{ $mem := (.Subrequest "memory").JSON.String "data.result.0.value.1" }}
          <div style="display:flex;gap:24px;padding:4px 0;">
            <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">CPU</div><div style="font-size:1.2rem;font-weight:700;">{{ if $cpu }}{{ $cpu }}%{{ else }}N/A{{ end }}</div></div>
            <div><div style="font-size:0.75rem;color:var(--color-subdue);text-transform:uppercase;">Memory</div><div style="font-size:1.2rem;font-weight:700;">{{ if $mem }}{{ $mem }}%{{ else }}N/A{{ end }}</div></div>
          </div>

  columns:
    - size: full
      widgets:
        # Authentik Applications - Custom API widget
        - type: custom-api
          title: Authentik Applications
          hide-header: true
          frameless: true
          url: ${AUTHENTIK_URL}/api/v3/core/applications/?page_size=500&superuser_full_list=true
          cache: 1h
          headers:
            Authorization: Bearer ${AUTHENTIK_API_TOKEN}
            Accept: application/json
          template: |
            <style>
              .app-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                background: rgba(0,0,0,0.05);
                border-radius: 8px;
                text-decoration: none;
                color: var(--color-primary);
                transition: background 120ms ease-in-out;
              }
              .app-item:hover { background: rgba(0,0,0,0.08); }
              .app-icon { width: 24px; height: 24px; object-fit: contain; }
              .app-name { font-size: 0.95rem; font-weight: 600; }
              .app-description { display: block; font-size: 0.8rem; color: var(--color-subdue); }
              .app-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 10px;
                margin: 0;
                padding: 0;
                list-style: none;
              }
              .app-grid-item { margin: 0; }
              @media (max-width: 900px) {
                .app-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
              }
              @media (max-width: 600px) {
                .app-grid { grid-template-columns: 1fr; }
              }
            </style>
            {{ $groups := (.JSON.Array "results" | sortByString "group" "asc" | unique "group") }}
            {{ range $index, $item := $groups }}
            {{ $group := $item.String "group" }}
            {{ if eq (findMatch "^System:" $group) "" }}
              <div class="widget-header">
                  <h2 class="uppercase widget-title-wrapper"><span>{{ $group }}</span></h2>
              </div>
              <div class="widget-content">
                <ul class="app-grid">
                  {{ range $.JSON.Array "results" | sortByString "name" "asc" }}
                    {{ $url := .String "meta_launch_url" }}
                    {{ if and (eq (.String "group") $group) (ne $url "") (not (findMatch "System:" $group)) }}
                      <li class="app-grid-item">
                        <a href="{{ $url }}" target="_blank" class="app-item" title="{{ .String "meta_description" }}">
                          {{ if .String "meta_icon" }}
                            <img src="{{ .String "meta_icon" }}" alt="{{ .String "name" }}" class="app-icon">
                          {{ end }}
                          <span>
                            <span class="app-name">{{ .String "name" }}</span>
                            <span class="app-description">{{ .String "description" }}</span>
                          </span>
                        </a>
                      </li>
                    {{ end }}
                  {{ end }}
                </ul>
              </div>
              {{ end }}
            {{ end }}



    - size: small
      widgets:
        - $include: widgets/nodes.yaml
