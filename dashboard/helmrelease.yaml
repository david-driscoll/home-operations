---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dynacat
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  interval: 15m
  driftDetection:
    mode: enabled
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: 7
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 7
      strategy: rollback
  rollback:
    force: true
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        pod:
          securityContext:
            runAsNonRoot: false

        containers:
          *app :
            image:
              repository: ghcr.io/panonim/dynacat
              tag: 2.3.1@sha256:879f07646aaf6fc5f6ded8d734711a4c8364df3a64ab48091ddd1be9b7151172
            env:
              TZ: "${TIMEZONE}"
            envFrom:
              - secretRef:
                  name: ${APP}-env
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

          extensions:
            image:
              repository: mcr.microsoft.com/dotnet/sdk
              tag: "10.0"
            command: ["dotnet", "run", "Extensions.cs"]
            workingDir: /app
            env:
              ASPNETCORE_HTTP_PORTS: "8090"
              NUGET_PACKAGES: "/tmp/nuget"
              DOTNET_ENVIRONMENT: "Production"
            envFrom:
              - secretRef:
                  name: ${APP}-env
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    persistence:
      assets:
        existingClaim: ${APP}
        globalMounts:
          - path: /home/user/glance-assets
            subPath: assets
      config-files:
        type: configMap
        name: ${APP}-config
        defaultMode: 493
        globalMounts:
          - path: /app/config/
            readOnly: true
      widgets-files:
        type: configMap
        name: ${APP}-widgets
        defaultMode: 493
        globalMounts:
          - path: /app/config/widgets/
            readOnly: true
      servers-files:
        type: configMap
        name: ${APP}-servers
        defaultMode: 493
        globalMounts:
          - path: /app/config/servers/
            readOnly: true
      extensions-file:
        type: configMap
        name: ${APP}-extensions
        defaultMode: 444
        advancedMounts:
          dynacat:
            extensions:
              - path: /app/Extensions.cs
                subPath: Extensions.cs
                readOnly: true

    service:
      app:
        controller: *app
        type: ClusterIP
        ports:
          http:
            port: &port 8080
          extensions:
            port: 8090

    route:
      internal:
        parentRefs:
          - name: internal
            namespace: network
            kind: Gateway
        hostnames:
          - "${APP}.${ROOT_DOMAIN}"
          - "g.${ROOT_DOMAIN}"
        kind: HTTPRoute
        rules:
          - backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: local-user
