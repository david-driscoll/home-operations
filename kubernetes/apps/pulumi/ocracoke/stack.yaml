---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/pulumi.com/stack_v1.json
apiVersion: pulumi.com/v1
kind: Stack
metadata:
  name: &stack ocracoke
spec:
  fluxSource:
    sourceRef:
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: GitRepository
      name: home-operations
    dir: stacks/ocracoke
  serviceAccountName: ${APP}
  stack: *stack
  resyncFrequencySeconds: 86400
  retryMaxBackoffDurationSeconds: 60
  backend: s3://home-operations/ocracoke?endpoint=truenas.driscoll.tech:9000&s3ForcePathStyle=true&disableSSL=true
  continueResyncOnCommitMatch: true
  destroyOnFinalize: false
  workspaceReclaimPolicy: Delete
  prerequisites:
    - name: backups
  envRefs:
    AWS_ACCESS_KEY_ID:
      type: Secret
      secret:
        name: truenas-home-operations
        key: username
    AWS_SECRET_ACCESS_KEY:
      type: Secret
      secret:
        name: truenas-home-operations
        key: password
    AWS_USE_PATH_STYLE_ENDPOINT:
      type: Literal
      literal:
        value: "true"
    AWS_REGION:
      type: Literal
      literal:
        value: "home-operations"
    GITHUB_TOKEN:
      type: Secret
      secret:
        name: pulumi-operator-github
        key: credential
    CONNECT_HOST:
      type: Literal
      literal:
        value: "http://onepassword-connect.kube-system.svc.cluster.local:8080"
    CONNECT_VAULT:
      type: Literal
      literal:
        value: "Eris"
    CONNECT_TOKEN:
      type: Secret
      secret:
        name: pulumi-operator-connect-token
        key: credential
    PULUMI_CONFIG_PASSPHRASE:
      type: Secret
      secret:
        name: pulumi-operator-passphrase
        key: password
  secretsRef:
    github:token:
      type: Secret
      secret:
        name: pulumi-operator-github
        key: credential
    authentik:token:
      type: Secret
      secret:
        name: authentik-secret
        key: credential
    authentik:url:
      type: Secret
      secret:
        name: authentik-secret
        key: url
  workspaceTemplate:
    spec:
      # renovate: datasource=docker depName=pulumi/pulumi-nodejs
      image: ghcr.io/pulumi/pulumi-nodejs:3.248.0@sha256:df1b6117638b9b5b90cbe4684845b9babb67933ce477c93916402522046833f6
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: pulumi-operator-github
              key: credential
        # Cap V8's heap well under the 6Gi container limit so Node proactively GCs
        # instead of ballooning until the kernel OOM-kills the whole process tree.
        - name: NODE_OPTIONS
          value: "--max-old-space-size=4096"
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          # cpu: 1
          memory: 6Gi
      podTemplate:
        spec:
          volumes:
            - name: npm-cache
              hostPath:
                path: /var/lib/pulumi-npm-cache
                type: DirectoryOrCreate
          containers:
            - name: pulumi
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  memory: 6Gi
              volumeMounts:
                - name: npm-cache
                  mountPath: /root/.npm
