---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-ssh-credentials
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  refreshInterval: 1m
  refreshPolicy: Periodic
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: vault-ssh-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      metadata:
        annotations:
          reloader.stakater.com/auto: "true"
      data:
        identity: '{{ .private_key }}'
        known_hosts: '{{ .known_hosts }}'
  dataFrom:
    - extract:
        key: GitHub david-driscoll/vault Deploy Key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
      rewrite:
        - regexp:
            source: '[\W]'
            target: _
