---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pulumi-npm-cache-prune
  namespace: pulumi
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      # One completion per cluster node — update if node count changes
      completions: 4
      parallelism: 4
      template:
        metadata:
          labels:
            app: pulumi-npm-cache-prune
        spec:
          restartPolicy: OnFailure
          tolerations:
            - operator: Exists
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app: pulumi-npm-cache-prune
          volumes:
            - name: npm-cache
              hostPath:
                path: /var/lib/pulumi-npm-cache
                type: DirectoryOrCreate
          containers:
            - name: prune
              image: busybox:latest@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
              command:
                - /bin/sh
                - -c
                - |
                  find /cache -type f -atime +30 -delete 2>/dev/null || true
                  find /cache -mindepth 1 -type d -empty -delete 2>/dev/null || true
                  echo "Pruned npm cache on $(hostname)"
              volumeMounts:
                - name: npm-cache
                  mountPath: /cache
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
