---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pulumi-stacks
spec:
  groups:
    - name: pulumi.stacks
      rules:
        - alert: PulumiStackFailed
          # Fires when a stack has accumulated failures (covers both "failed" and
          # "retryingAfterFailure" states). lastUpdate.failures is a reliable counter
          # that increments on every failed run regardless of which condition type is set.
          expr: kube_stack_last_update_failures > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pulumi Stack {{ $labels.name }} is failing"
            description: "Stack {{ $labels.namespace }}/{{ $labels.name }} has {{ $value }} consecutive failures. Check the stack logs for details."

        - alert: PulumiStackStalled
          # Fires when a stack has last_update_state == 0 (not succeeded) AND
          # has been stuck for a long time with high failure count.
          expr: kube_stack_last_update_failures > 100
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "Pulumi Stack {{ $labels.name }} is stalled"
            description: "Stack {{ $labels.namespace }}/{{ $labels.name }} has {{ $value }} failures and cannot make progress."

        - alert: PulumiStackPrerequisiteNotSatisfied
          # Reconciling condition has type="Reconciling" status="True" reason="PrerequisiteNotSatisfied"
          # booleanValueTrue="True" → metric value is 1 when status="True"
          expr: kube_stack_status_condition{type="Reconciling", reason="PrerequisiteNotSatisfied"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Pulumi Stack {{ $labels.name }} prerequisites not satisfied for 30m"
            description: "Stack {{ $labels.namespace }}/{{ $labels.name }} prerequisites have not been satisfied for 30 minutes."

        - alert: PulumiStackLocked
          # Fires when status.lastUpdate.message contains a Pulumi state lock.
          # Stale locks occur when the workspace pod restarts mid-run without releasing the lock.
          # The auto-canceller CronJob will resolve locks held > 30m via `pulumi cancel`.
          expr: kube_stack_last_update_info{message=~"(?s).*locked by.*"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pulumi Stack {{ $labels.name }} is lock-blocked"
            description: "Stack {{ $labels.namespace }}/{{ $labels.name }} is failing because the Pulumi state is locked. The auto-canceller will resolve this after 30 minutes, or run `kubectl exec -n {{ $labels.namespace }} {{ $labels.name }}-workspace-0 -- pulumi cancel --yes` to resolve immediately."
