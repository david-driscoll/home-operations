name: home
description: Configure base homelab services, and services.
runtime:
  name: nodejs
  options:
    packagemanager: npm
    typescript: false
    nodeargs: "--import tsx/esm"
config:
  pulumi:tags:
    value:
      pulumi:template: typescript
packages:
  authentik:
    source: terraform-provider
    version: 0.14.0
    parameters: [registry.terraform.io/goauthentik/authentik, 2026.5.0]
  unifi:
    source: terraform-provider
    version: 0.14.0
    parameters: [registry.terraform.io/ubiquiti-community/unifi, 0.55.0]
  b2:
    source: terraform-provider
    version: 0.14.0
    parameters: [registry.terraform.io/Backblaze/b2, 0.13.1]
  pbs:
    source: terraform-provider
    version: 0.14.0
    parameters: [registry.terraform.io/mcfitz2/pbs, 0.2.1]
  terrifi:
    source: terraform-provider
    version: 0.14.0
    parameters: [registry.opentofu.org/alexklibisz/terrifi, 0.9.3]
  tailscale:
    source: terraform-provider
    version: 0.14.0
    parameters: [registry.terraform.io/tailscale/tailscale, 0.29.2]
