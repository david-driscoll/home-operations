[settings]
experimental = true

[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
AWS_ACCESS_KEY_ID = "op://Eris/minio root user/username"
AWS_SECRET_ACCESS_KEY = "op://Eris/minio root user/password"
AWS_REGION = "home"
PULUMI_CONFIG_PASSPHRASE = "op://Eris/Pulumi Passphrase/password"
CONNECT_HOST = "https://op-connect.sgc.driscoll.tech/"
CONNECT_VAULT = "Eris"
CONNECT_TOKEN = "op://Eris/Eris 1Password Connect Access Token/credential"
AUTHENTIK_TOKEN = "op://Eris/Authentik Token/credential"
AUTHENTIK_URL = "op://Eris/Authentik Token/url"

[tools]
python = "3.14.6"
kubectl = "1.36.2"
powershell-core = "7.6.3"
1password-cli = "2.34.1"
yq = "4.53.3"
jq = "1.8.2"
task = "3.51.1"
sops = "3.13.1"
flux2 = "2.8.8"
age = "1.3.1"
gh = "2.95.0"
"npm:typescript" = "5.9.3"
node = "24.16.0"
pulumi = "3.247.0"
"github:microsoft/apm" = { version = "v0.21.0", bin = "apm" }
"github:eljulians/skillfile" = { version = "v1.7.1", bin = "skillfile" }
"github:yvgude/lean-ctx" = { version = "v3.8.8", bin = "lean-ctx" }
dotnet = { postinstall = "dotnet tool restore && dotnet restore", version = "10.0.203" }
    