[settings]
experimental = true

[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
AWS_ACCESS_KEY_ID = "op://Eris/minio root user/username"
AWS_SECRET_ACCESS_KEY = "op://Eris/minio root user/password"
AWS_REGION = "home"
PULUMI_CONFIG_PASSPHRASE = "op://Eris/Pulumi Passphrase/password"
CONNECT_HOST = "https://op-connect.sgc.driscoll.tech/"
CONNECT_VAULT = "Eris"
CONNECT_TOKEN = "op://Eris/Eris 1Password Connect Access Token/credential"
AUTHENTIK_TOKEN = "op://Eris/Authentik Token/credential"
AUTHENTIK_URL = "op://Eris/Authentik Token/url"

[tools]
python = "3.14.6"
kubectl = "1.36.3"
powershell-core = "7.6.4"
1password-cli = "2.35.0"
yq = "4.53.3"
jq = "1.8.2"
task = "3.52.0"
sops = "3.13.3"
flux2 = "2.9.3"
age = "1.3.1"
gh = "2.96.0"
hk = "1.53.0"
pkl = "0.32.0"
biome = "2.5.2"
typos = "1.48.0"
"npm:typescript" = "5.9.3"
node = "24.18.0"
pulumi = "3.254.0"
"github:microsoft/apm" = { version = "v0.26.0", bin = "apm" }
"github:eljulians/skillfile" = { version = "v1.9.0", bin = "skillfile" }
"github:home-operations/flate" = "v0.4.12"
"github:yvgude/lean-ctx" = { version = "v3.9.12", bin = "lean-ctx" }
dotnet = { version = "10.0.203" }

[hooks.postinstall]
script = "pulumi install"

[tasks.update]
description = 'Update all apps that have an update script'
run = [
  'dotnet run .mise/tasks/do-update.cs',
  'mise task flate',
]

[tasks.flate]
description = 'Run flate'
run = [
  'flate test all --allow-missing-secrets --source-retry-attempts 10',
]
